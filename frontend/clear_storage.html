<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage</title>
</head>
<body>
    <h1>Clearing localStorage...</h1>
    <script>
        localStorage.removeItem('foodButlerToken');
        localStorage.removeItem('foodButlerUserEmail');
        localStorage.clear();
        document.body.innerHTML += '<p style="color: green;">✓ Storage cleared! You can close this tab.</p>';
        console.log('Storage cleared');
    </script>
</body>
</html>
